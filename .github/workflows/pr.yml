name: Build validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Unit tests
        run: go test ./...

  container-smoke-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker (containerd image store)
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 and arm64 test image (load locally)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          tags: fogcast:ci-smoke
          platforms: linux/amd64,linux/arm64
          load: true

      - name: Run smoke test
        run: |
          set -euo pipefail
          cid=""
          cleanup() {
            if [[ -n "$cid" ]]; then
              docker rm -f "$cid" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          cid=$(docker run -d -p 18080:8080 fogcast:ci-smoke)

          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/api/state >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done

          if [[ "$ready" -ne 1 ]]; then
            echo "Smoke test failed: /api/state never became ready"
            docker logs "$cid" || true
            exit 1
          fi

          curl -fsS http://127.0.0.1:18080/api/state >/dev/null

  player-e2e-memory-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26

      - name: Build frontend and binary
        run: bash ./scripts/build.sh

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run player E2E memory gate
        run: |
          set -euo pipefail
          npm run test:e2e:memory
          cat test-results/e2e-player-memory-summary.json
